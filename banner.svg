<svg width="100%" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="30%" stop-color="#a855f7"/>
      <stop offset="65%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <clipPath id="typeClip">
      <rect x="270" y="150" width="0" height="34">
        <animate attributeName="width" values="0;660;660;0;0" keyTimes="0;0.3;0.75;0.85;1" dur="6s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- ambient glow pulse behind title -->
  <circle cx="600" cy="105" r="150" fill="url(#glow)">
    <animate attributeName="r" values="140;175;140" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- floating particles -->
  <circle cx="95" cy="70" r="4" fill="#ffffff" fill-opacity="0.55">
    <animate attributeName="cy" values="70;40;70" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.55;0.15;0.55" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="230" r="3" fill="#ffffff" fill-opacity="0.45">
    <animate attributeName="cy" values="230;200;230" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.45;0.1;0.45" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="60" r="4" fill="#ffffff" fill-opacity="0.5">
    <animate attributeName="cy" values="60;95;60" dur="4.7s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.5;0.12;0.5" dur="4.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1040" cy="250" r="3.5" fill="#ffffff" fill-opacity="0.5">
    <animate attributeName="cy" values="250;218;250" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.5;0.12;0.5" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="35" r="2.5" fill="#ffffff" fill-opacity="0.4">
    <animate attributeName="cy" values="35;15;35" dur="3.4s" repeatCount="indefinite"/>
  </circle>

  <!-- bottom waves -->
  <path d="M0,235 C200,195 340,275 560,235 C780,195 900,255 1200,215 L1200,320 L0,320 Z" fill="url(#waveGrad)"/>
  <path d="M0,265 C220,225 380,295 600,265 C820,235 960,285 1200,255 L1200,320 L0,320 Z" fill="#ffffff" fill-opacity="0.07"/>

  <!-- corner accents -->
  <path d="M55,80 L55,115 L95,115" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5" fill="none"/>
  <path d="M1145,205 L1145,170 L1105,170" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5" fill="none"/>

  <!-- name -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#ffffff">
    <text x="600" y="118" font-size="56" font-weight="700" text-anchor="middle" letter-spacing="1">Harshita Chaturvedi</text>
  </g>

  <!-- animated typing tagline -->
  <g font-family="'Courier New', monospace" font-size="24" fill="#ffffff" fill-opacity="0.95">
    <text x="270" y="176" clip-path="url(#typeClip)">Full-Stack Developer · AI Builder · Power Platform Engineer</text>
  </g>
  <rect x="930" y="151" width="3" height="26" fill="#ffffff">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.3;0.32;0.85;0.87" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="270;930;930;930;270" keyTimes="0;0.3;0.75;0.85;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- static sub-line -->
  <g font-family="'Courier New', monospace" font-size="15" fill="#ffffff" fill-opacity="0.8">
    <text x="600" y="222" text-anchor="middle">MCA Graduate &#183; CGPA 8.02 &#183; Open to opportunities</text>
  </g>
</svg>
